<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="format-detection" content="telephone=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>ZanLive — 下载</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="config.js"></script>
    <script>
      (function () {
        var cfg = window.APP_PUBLISH_CONFIG || {};
        var ua = navigator.userAgent || '';
        var isIOS =
          /iPad|iPhone|iPod/i.test(ua) ||
          (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
        var iosUrl = (cfg.iosAppStoreUrl || '').trim();
        if (isIOS && iosUrl) {
          window.location.replace(iosUrl);
        }
      })();
    </script>
  </head>
  <body>
    <main class="page" id="app">
      <div class="glow glow-a" aria-hidden="true"></div>
      <div class="glow glow-b" aria-hidden="true"></div>

      <header class="hero">
        <div class="logo" aria-hidden="true">
          <span class="logo-mark">Z</span>
        </div>
        <h1 class="app-name" id="app-name">ZanLive</h1>
        <p class="tagline" id="tagline">精彩直播，随时互动</p>
        <p class="version" id="version"></p>
      </header>

      <section class="actions" id="actions" hidden>
        <a class="btn btn-primary" id="btn-android" href="#" download>
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path
                d="M17.6 9.48l1.84-3.18c.16-.31.04-.69-.26-.85a.637.637 0 0 0-.83.22l-1.88 3.24a11.43 11.43 0 0 0-8.94 0L5.65 5.67a.643.643 0 0 0-.87-.2c-.3.16-.42.54-.26.85l1.84 3.18C2.92 11.03 1 14.22 1 17.5h22c0-3.28-1.92-6.47-5.4-8.02zM7 15.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5zm10 0a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5z"
              />
            </svg>
          </span>
          下载 Android 版
        </a>
        <p class="hint" id="android-hint">点击按钮下载 APK 并安装</p>
      </section>

      <section class="actions actions-dual" id="actions-dual" hidden>
        <a class="btn btn-primary" id="btn-android-desktop" href="#">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path
                d="M17.6 9.48l1.84-3.18c.16-.31.04-.69-.26-.85a.637.637 0 0 0-.83.22l-1.88 3.24a11.43 11.43 0 0 0-8.94 0L5.65 5.67a.643.643 0 0 0-.87-.2c-.3.16-.42.54-.26.85l1.84 3.18C2.92 11.03 1 14.22 1 17.5h22c0-3.28-1.92-6.47-5.4-8.02zM7 15.25a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5zm10 0a1.25 1.25 0 1 1 0-2.5 1.25 1.25 0 0 1 0 2.5z"
              />
            </svg>
          </span>
          Android 下载
        </a>
        <a class="btn btn-secondary" id="btn-ios-desktop" href="#">
          <span class="btn-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
              <path
                d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"
              />
            </svg>
          </span>
          App Store
        </a>
        <p class="platform-unavailable" id="android-unavailable" hidden></p>
        <p class="platform-unavailable" id="ios-unavailable" hidden></p>
        <p class="hint" id="desktop-hint">请使用手机扫码，或在对应设备上打开本页</p>
      </section>

      <section class="ios-redirect" id="ios-redirect" hidden>
        <p class="ios-text">正在前往 App Store…</p>
        <a class="link" id="ios-fallback" href="#">若未自动跳转，请点击此处</a>
      </section>

      <section class="coming-soon" id="coming-soon" hidden>
        <p class="coming-soon-text" id="coming-soon-text"></p>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>

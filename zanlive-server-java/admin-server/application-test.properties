#spring.profiles.active=dev
server.port=8081
spring.application.name=admin-server
logging.file.name=./${spring.application.name}.log

spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

spring.freemarker.settings.number_format=0
spring.freemarker.settings.time_zone=GMT+8
spring.freemarker.expose-request-attributes=true
spring.freemarker.expose-session-attributes=true

server.servlet.session.timeout=8H

management.endpoints.web.exposure.include= *
management.endpoint.health.show-details=always
management.endpoint.shutdown.enabled=true
management.endpoints.web.base-path=/management

##################################################################
#                         JDBC Config                            #
##################################################################

spring.datasource.url = jdbc:mysql://127.0.0.1:3306/your_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
spring.datasource.username = your_db
spring.datasource.password = db_password
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.datasource.type= com.zaxxer.hikari.HikariDataSource

spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=ADMIN_HIKARI_POOL
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1


##################################################################
#                         JPA Config                             #
##################################################################
spring.jpa.database = MYSQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto = none
spring.jpa.open-in-view = false
spring.jpa.hibernate.naming.implicit-strategy= org.hibernate.boot.model.naming.ImplicitNamingStrategyJpaCompliantImpl
spring.jpa.hibernate.naming.physical-strategy= org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

##################################################################
#                         Redis Config                           #
##################################################################
spring.data.redis.repositories.enabled=false
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=1
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-wait= 10s
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.timeout=10s

##################################################################
#                         Freemarker Config                      #
##################################################################
spring.freemarker.suffix=.html
spring.freemarker.charset=utf-8
spring.freemarker.content-type=text/html
spring.freemarker.cache=false
spring.freemarker.template-loader-path=classpath:/page/
spring.freemarker.settings.auto_import = /ftl/spring.ftl as spring
spring.messages.encoding=UTF-8
spring.messages.basename=i18n/messages




##################################################################
#                         System Config                          #
##################################################################
#\u7BA1\u7406\u5458\u8D26\u53F7\u5BC6\u7801
sys.manager.account=admin
sys.manager.password=system
sys.manager.name=\u7CFB\u7EDF\u7BA1\u7406\u5458

#\u540E\u53F0\u4E0A\u4F20Logo\u6587\u4EF6\u6700\u5927200KB
sys.dashboard.logo.multipart.max-file-size=200KB
sys.dashboard.gift.multipart.max-file-size=10MB


##################################################################
#                         File Store Config                      #
##################################################################
bogo.file.local.enable = true

bogo.file.oss.enable = false
bogo.file.oss.endpoint=https://your-endpoint
bogo.file.oss.access-id=yours
bogo.file.oss.access-key=yours
bogo.file.oss.bucket=yours


##################################################################
#                         Feign Config                           #
##################################################################
spring.cloud.openfeign.compression.request.enabled=true
spring.cloud.openfeign.compression.request.mime-types=text/xml,application/xml,application/json
spring.cloud.openfeign.compression.request.min-request-size=2048
spring.cloud.openfeign.compression.response.enabled=true
logging.level.com.bogo.admin.feign.BootService=debug


##################################################################
#                         Boot Config                            #
#为了环境搭建方便，配置了boot服务的地址和端口，通过feign调用来发送内部消息  #
#最佳实践：应该使用eureka 或者 consul、nacos 等注册中心。              #
##################################################################
boot.server.endpoint = http://127.0.0.1:8080

##################################################################
#                         Live Stream Config                      #
##################################################################
#示例: your-stream-host/live/
bogo.live.anchor.stream-prefix=127.0.0.1:18080/live/
